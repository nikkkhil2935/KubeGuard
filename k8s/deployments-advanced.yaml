apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: kubeguard
  labels:
    app: microservice
    component: api-gateway
    team: s8ul
spec:
  replicas: 3
  selector:
    matchLabels:
      component: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: microservice
        component: api-gateway
        team: s8ul
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: kubeguard-controller
      containers:
      - name: api-gateway
        image: kubeguard-api-gateway:latest
        imagePullPolicy: Never
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: SERVICE_NAME
          value: api-gateway
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: VERSION
          value: "2.0.0"
        - name: CORE_SERVICE_URL
          value: http://core-service:8001
        - name: WORKER_SERVICE_URL
          value: http://worker-service:8002
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
---
